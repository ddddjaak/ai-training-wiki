site_name: "解决方案中心 - AI Center"
site_description: "面向 AE / SE 工程师的 Claude Code + ae-skills / se-skills 实战指南"
repo_name: ddddjaak/ai-training-wiki
repo_url: https://github.com/ddddjaak/ai-training-wiki

theme:
  name: material
  language: zh
  icon:
    logo: material/chip
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: 暗色模式
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ddddjaak/ai-training-wiki

copyright: "© 2026 解决方案中心 · Powered by MkDocs Material"

